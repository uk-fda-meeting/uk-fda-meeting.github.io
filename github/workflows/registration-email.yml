name: Registration Auto-Response

on:
  issues:
    types: [opened]

jobs:
  auto-respond:
    if: contains(github.event.issue.labels.*.name, 'registration')
    runs-on: ubuntu-latest
    steps:
      - name: Create Welcome Comment
        uses: peter-evans/create-or-update-comment@v3
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            Hi there,

            Thank you for registering for the **1st UK Functional Data Analysis Network Meeting** at Queen Mary University of London!

            This automated message confirms that your registration form has been successfully received and your details have been logged. 
            
            Best regards,
            **UK Functional Data Analysis Joint Research Group Committee**
